name: Package Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION=$(cat manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package zip
        run: |
          zip -r MangaLens-v${{ steps.version.outputs.version }}.zip \
            manifest.json background.js content.js popup.html popup.js icons/ README.md

      - name: Upload to existing release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: MangaLens v${{ steps.version.outputs.version }}
          files: MangaLens-v${{ steps.version.outputs.version }}.zip
          body: |
            ## Install
            1. Download the zip below and unzip it
            2. Open Chrome or Edge and go to chrome://extensions/
            3. Enable Developer Mode (toggle top-right)
            4. Click Load unpacked and select the unzipped folder
            5. Get a free Gemini API key at aistudio.google.com/app/apikey
            6. Click the extension icon, paste your key, pick language, Save
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

